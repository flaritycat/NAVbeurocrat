server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

  location = / {
    try_files /nav/index.html =404;
  }

  location = /nav {
    try_files /nav/index.html =404;
  }

  location = /NAV {
    return 301 /nav/;
  }

  location = /NAV/ {
    return 301 /nav/;
  }

  location = /nav/healthz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok","service":"nav-frontend"}';
  }

  location = /healthz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ok","service":"nav-frontend"}';
  }

  location = /nav/readyz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ready","service":"nav-frontend"}';
  }

  location = /readyz {
    access_log off;
    default_type application/json;
    return 200 '{"status":"ready","service":"nav-frontend"}';
  }

  location /nav/assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    alias /usr/share/nginx/html/nav/assets/;
  }

  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;
    alias /usr/share/nginx/html/nav/assets/;
  }

  location /nav/ {
    try_files $uri $uri/ /nav/index.html;
  }

  location / {
    try_files $uri $uri/ /nav/index.html;
  }
}
